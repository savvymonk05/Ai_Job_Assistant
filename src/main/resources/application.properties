# Server
server.port=8080
spring.application.name=ai-job-assist

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/aijobassist
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Vinay@1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgc2VjcmV0IGtleSBmb3IgSldUIHRva2VuIGdlbmVyYXRpb24gMjU2IGJpdHM=}
app.jwt.expiration-ms=86400000

# Gemini AI
app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.model=gemini-2.0-flash

