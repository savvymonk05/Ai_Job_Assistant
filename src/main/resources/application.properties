# ====================================
# AI Job Assistance Platform
# Application Configuration
# ====================================

# ---------- Server ----------
server.port=8080

# ---------- PostgreSQL Database ----------
# 'aijobassist' is the database name — you must create it in PostgreSQL first
spring.datasource.url=jdbc:postgresql://localhost:5432/aijobassist
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

# ---------- JPA / Hibernate ----------
# 'update' means Hibernate will auto-create/update tables based on your entities.
# In production, you'd use 'validate' + Flyway/Liquibase for migrations.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ---------- JWT Configuration ----------
# IMPORTANT: In production, use environment variables, not hardcoded secrets!
app.jwt.secret=your-super-secret-key-which-should-be-at-least-256-bits-long-for-hs256
app.jwt.expiration-ms=86400000

# ---------- Gemini API ----------
app.gemini.api-key=your_gemini_api_key_here
app.gemini.model=gemini-2.0-flash
